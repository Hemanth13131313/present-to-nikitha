<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>For You ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Great+Vibes&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#080610;color:#f5e6d3;font-family:'Cormorant Garamond',serif;overflow:hidden}
body.can-scroll{overflow-y:auto;overflow-x:hidden}

#bg{position:fixed;inset:0;z-index:0}

/* ── ENVELOPE ── */
#env{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity .9s ease,transform .9s ease;
}
#env.hide{opacity:0;transform:scale(1.12);pointer-events:none}
.ew{position:relative;width:240px;height:165px;perspective:800px}
.eb{width:240px;height:165px;background:linear-gradient(145deg,#1e1228,#140d1e);border:1px solid rgba(255,170,200,.16);border-radius:10px;box-shadow:0 20px 70px rgba(0,0,0,.6),0 0 45px rgba(255,140,180,.07)}
.ef{position:absolute;top:0;left:0;width:240px;height:88px;background:linear-gradient(180deg,#1e1228,#170e22);border:1px solid rgba(255,170,200,.1);clip-path:polygon(0 0,50% 100%,100% 0);transform-origin:top center;transition:transform .65s ease;z-index:2}
.ew:hover .ef{transform:rotateX(-22deg)}
.es{position:absolute;top:72px;left:50%;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,#e8a0b4,#c07090);box-shadow:0 0 20px rgba(230,140,170,.4);z-index:3;display:flex;align-items:center;justify-content:center;font-size:13px}
.el{font-family:'Great Vibes',cursive;font-size:2rem;color:#ffd6e8;margin-top:2rem;text-shadow:0 0 30px rgba(255,160,200,.3);opacity:0;animation:fu 1s .5s ease forwards}
.eh{font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:200;color:rgba(255,190,220,.4);margin-top:1.2rem;letter-spacing:.3em;text-transform:uppercase;opacity:0;animation:fu 1s 1s ease forwards,pulse 2.5s 2s infinite}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}

/* ── CONTENT ── */
#content{position:relative;z-index:2;opacity:0;transition:opacity 1.2s ease .2s}
#content.show{opacity:1}

/* ── TREE SECTION ── */
#sec-tree{
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;padding:1.5rem 0;
}
#sec-tree .title{
  font-family:'Great Vibes',cursive;font-size:2.6rem;color:#ffd6e8;
  text-shadow:0 0 40px rgba(255,150,190,.28);margin-bottom:.2rem;
  opacity:0;
}
#sec-tree .name{
  font-family:'Great Vibes',cursive;font-size:2.2rem;color:#ffd6a5;
  text-shadow:0 0 35px rgba(255,200,140,.25);margin-bottom:.8rem;
  opacity:0;letter-spacing:.04em;
}
#sec-tree .name.vis{animation:fu 1.2s .3s ease forwards}
#sec-tree .title.vis{animation:fu 1.2s ease forwards}
#treeC{display:block;max-width:100%}

.scroll-hint{
  position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);
  font-family:'Outfit',sans-serif;font-size:.65rem;font-weight:200;
  color:rgba(255,190,220,.35);letter-spacing:.25em;text-transform:uppercase;
  opacity:0;transition:opacity 1s ease;
}
.scroll-hint.vis{opacity:1;animation:bob 2s .5s infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(5px)}}

/* ── MESSAGE SECTION ── */
#sec-msg{
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:2.5rem 1rem;
}
.card{
  max-width:420px;width:100%;
  background:rgba(255,190,215,.03);border:1px solid rgba(255,170,205,.1);
  border-radius:22px;padding:1.8rem 1.6rem;position:relative;
  backdrop-filter:blur(8px);
}
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:22px;
  background:linear-gradient(135deg,rgba(255,170,210,.1) 0%,transparent 45%,rgba(210,165,110,.05) 100%);
  pointer-events:none;
}
.dtag{
  display:inline-block;font-family:'Outfit',sans-serif;font-size:.62rem;font-weight:300;
  letter-spacing:.2em;text-transform:uppercase;color:rgba(210,165,115,.55);
  border:1px solid rgba(210,165,115,.14);padding:.2rem .65rem;border-radius:14px;margin-bottom:1.1rem;
}
.card .hb{
  font-family:'Great Vibes',cursive;font-size:2.4rem;color:#ffd6e8;
  line-height:1;margin-bottom:1.2rem;text-shadow:0 0 35px rgba(255,130,170,.22);
}
#msg{font-size:1rem;line-height:2;color:#efe5d5;font-weight:300;letter-spacing:.02em}
.cursor{display:inline-block;width:2px;height:1rem;background:#ffb5c8;animation:bl .85s infinite;vertical-align:middle;margin-left:1px}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* ── PETALS ── */
.petal{position:fixed;pointer-events:none;z-index:4;border-radius:50% 0 50% 50%;opacity:0}

/* ── FIREFLIES ── */
.ff{position:fixed;width:3px;height:3px;border-radius:50%;background:#ffe57a;box-shadow:0 0 7px 3px rgba(255,228,90,.45);pointer-events:none;z-index:3;opacity:0}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="env" onclick="openEnv()">
  <div class="ew"><div class="ef"></div><div class="eb"></div><div class="es">💌</div></div>
  <div class="el">For You</div>
  <div class="eh">tap to open</div>
</div>

<div id="content">
  <section id="sec-tree">
    <div class="title" id="tTitle">Happy Birthday</div>
    <div class="name" id="tName">Nikitha</div>
    <canvas id="treeC"></canvas>
    <div class="scroll-hint" id="sHint">scroll down ↓</div>
  </section>
  <section id="sec-msg">
    <div class="card">
      <div class="dtag">April 26</div>
      <div class="hb">A Little Letter</div>
      <div id="msg"></div>
    </div>
  </section>
</div>

<script>
/* ═══ BACKGROUND ═══ */
const bg=document.getElementById('bg'),bc=bg.getContext('2d');
function rsz(){bg.width=innerWidth;bg.height=innerHeight}
rsz();window.addEventListener('resize',rsz);

const STARS=Array.from({length:200},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.4+.2,op:Math.random(),
  spd:Math.random()*.014+.003,dir:Math.random()>.5?1:-1
}));
let shoots=[];
setInterval(()=>shoots.push({x:Math.random()*bg.width*.6,y:Math.random()*bg.height*.35,vx:Math.random()*6+3,vy:Math.random()*2.5+1,op:1}),4500);

(function bgL(){
  bc.clearRect(0,0,bg.width,bg.height);
  const g=bc.createRadialGradient(bg.width*.5,bg.height*.15,0,bg.width*.5,bg.height*.6,bg.height);
  g.addColorStop(0,'#0d0625');g.addColorStop(.5,'#070818');g.addColorStop(1,'#030510');
  bc.fillStyle=g;bc.fillRect(0,0,bg.width,bg.height);
  // Pink nebula
  const n=bc.createRadialGradient(bg.width*.5,bg.height*.45,0,bg.width*.5,bg.height*.45,bg.height*.6);
  n.addColorStop(0,'rgba(140,60,110,.06)');n.addColorStop(1,'transparent');
  bc.fillStyle=n;bc.fillRect(0,0,bg.width,bg.height);

  STARS.forEach(s=>{s.op+=s.spd*s.dir;if(s.op>1||s.op<.05)s.dir*=-1;bc.beginPath();bc.arc(s.x,s.y,s.r,0,Math.PI*2);bc.fillStyle=`rgba(248,238,228,${s.op})`;bc.fill()});
  shoots=shoots.filter(s=>s.op>.02);
  shoots.forEach(s=>{const lg=bc.createLinearGradient(s.x,s.y,s.x+s.vx*5,s.y+s.vy*5);lg.addColorStop(0,`rgba(255,210,200,${s.op})`);lg.addColorStop(1,'transparent');bc.beginPath();bc.moveTo(s.x,s.y);bc.lineTo(s.x+s.vx*4,s.y+s.vy*4);bc.strokeStyle=lg;bc.lineWidth=1.2;bc.stroke();s.x+=s.vx;s.y+=s.vy;s.op-=.018});
  requestAnimationFrame(bgL);
})();

/* ═══ ENVELOPE ═══ */
let opened=false;
function openEnv(){
  if(opened)return;opened=true;
  document.querySelector('.ef').style.transform='rotateX(-180deg)';
  setTimeout(()=>{
    document.getElementById('env').classList.add('hide');
    document.getElementById('content').classList.add('show');
    document.body.classList.add('can-scroll');
    startPetals();
    setTimeout(growTree,600);
  },650);
}

/* ═══ PETALS ═══ */
const PCOL=['rgba(255,183,197,.55)','rgba(255,160,185,.45)','rgba(255,200,210,.5)','rgba(255,210,220,.4)','rgba(255,240,245,.35)'];
let petals=[];
function startPetals(){
  function spawn(){
    if(petals.length>28)return;
    const el=document.createElement('div');el.className='petal';
    el.style.background=`radial-gradient(ellipse,${PCOL[Math.floor(Math.random()*PCOL.length)]},transparent)`;
    el.style.width=(5+Math.random()*5)+'px';el.style.height=(7+Math.random()*5)+'px';
    const p={el,x:Math.random()*innerWidth,y:-12,vy:.35+Math.random()*.5,vx:(Math.random()-.5)*.4,rot:Math.random()*360,rs:(Math.random()-.5)*1.5,op:0,mx:.3+Math.random()*.3};
    document.body.appendChild(el);petals.push(p);
  }
  setInterval(spawn,600);
  (function pl(){
    petals.forEach(p=>{p.y+=p.vy;p.x+=p.vx+Math.sin(p.y*.01)*.25;p.rot+=p.rs;if(p.op<p.mx)p.op+=.006;if(p.y>innerHeight+15)p.op-=.025;p.el.style.transform=`translate(${p.x}px,${p.y}px) rotate(${p.rot}deg)`;p.el.style.opacity=Math.max(0,p.op)});
    petals=petals.filter(p=>{if(p.op<=0){p.el.remove();return false}return true});
    requestAnimationFrame(pl);
  })();
}

/* ═══ CHERRY BLOSSOM TREE ═══ */
const tc=document.getElementById('treeC'),tx=tc.getContext('2d');
// Size canvas for mobile
function sizeTree(){
  const w=Math.min(innerWidth,420);
  const h=Math.min(innerHeight*.7,560);
  tc.width=w;tc.height=h;
}
sizeTree();

const BCOL=['#ffb7c5','#ffc0cb','#ff9fb0','#ffe0e8','#fff5f7','#ffd1dc','#ffaabb'];
let tQ=[];

function buildTree(x,y,len,ang,w,d){
  const ex=x+len*Math.sin(ang),ey=y-len*Math.cos(ang);
  tQ.push({t:'b',x1:x,y1:y,x2:ex,y2:ey,w:w,d:d});

  if(len<7){
    const n=3+Math.floor(Math.random()*6);
    for(let i=0;i<n;i++){
      tQ.push({t:'f',x:ex+(Math.random()-.5)*16,y:ey+(Math.random()-.5)*16,r:2+Math.random()*3.5});
    }
    return;
  }
  const sp=.28+Math.random()*.22;
  buildTree(ex,ey,len*(.66+Math.random()*.1),ang-sp,w*.62,d+1);
  buildTree(ex,ey,len*(.66+Math.random()*.1),ang+sp,w*.62,d+1);
  if(len>22&&Math.random()>.25)
    buildTree(ex,ey,len*(.48+Math.random()*.14),ang+(Math.random()-.5)*.4,w*.48,d+1);
  if(len>50&&Math.random()>.5)
    buildTree(ex,ey,len*(.4+Math.random()*.1),ang+(Math.random()-.5)*.6,w*.42,d+1);
}

function drawB(it){
  tx.save();
  const cols=['#2a1610','#3d2218','#4a2a1a','#5a3828','#6a4030','#7a5040'];
  tx.strokeStyle=cols[Math.min(it.d,cols.length-1)];
  tx.lineWidth=it.w;tx.lineCap='round';
  if(it.w>3){tx.shadowColor='rgba(50,25,15,.25)';tx.shadowBlur=4}
  tx.beginPath();tx.moveTo(it.x1,it.y1);
  const mx=(it.x1+it.x2)/2+(Math.random()-.5)*4;
  const my=(it.y1+it.y2)/2+(Math.random()-.5)*4;
  tx.quadraticCurveTo(mx,my,it.x2,it.y2);
  tx.stroke();tx.restore();
}

function drawF(it){
  tx.save();
  const c=BCOL[Math.floor(Math.random()*BCOL.length)];
  tx.beginPath();tx.arc(it.x,it.y,it.r,0,Math.PI*2);
  tx.fillStyle=c;tx.globalAlpha=.55+Math.random()*.35;
  tx.shadowColor=c;tx.shadowBlur=7;
  tx.fill();tx.restore();
}

let qi=0;
function flushTree(){
  if(qi>=tQ.length){
    document.getElementById('tTitle').classList.add('vis');
    setTimeout(()=>document.getElementById('tName').classList.add('vis'),400);
    setTimeout(()=>document.getElementById('sHint').classList.add('vis'),1200);
    spawnFireflies();
    return;
  }
  const batch=Math.min(5,tQ.length-qi);
  for(let i=0;i<batch;i++,qi++){
    const it=tQ[qi];
    if(it.t==='b')drawB(it);else drawF(it);
  }
  setTimeout(flushTree,16);
}

function growTree(){
  sizeTree();tQ=[];qi=0;
  const startX=tc.width/2;
  const startY=tc.height-30;
  const trunkLen=Math.min(tc.height*.22,110);
  buildTree(startX,startY,trunkLen,0,Math.min(tc.width*.025,10),0);
  flushTree();
}

/* ═══ FIREFLIES ═══ */
function spawnFireflies(){
  for(let i=0;i<12;i++){
    setTimeout(()=>{
      const ff=document.createElement('div');ff.className='ff';
      ff.style.left=(20+Math.random()*60)+'%';
      ff.style.top=(10+Math.random()*50)+'%';
      document.body.appendChild(ff);
      const dx=(Math.random()-.5)*100;let t=0;
      (function a(){t+=.003;if(t>1)t=0;const e=t<.1?t*10:t>.9?(1-t)*10:1;ff.style.opacity=(e*.7).toFixed(2);ff.style.transform=`translateY(${-t*90}px) translateX(${dx*t*.4}px)`;requestAnimationFrame(a)})();
    },i*350+Math.random()*300);
  }
}

/* ═══ TYPEWRITER ═══ */
const lines=[
  `Hey... \u2728`,``,
  `Some people stay with you`,`even when they\u2019re not around.`,`You were always one of them.`,``,
  `6th class.`,`Same corridors, same laughter,`,`same little world we shared`,`without knowing how much`,`it would all come to mean.`,``,
  `Then 8th class came`,`and life just\u2026 moved.`,`No goodbye. No last page.`,`Just silence.`,``,
  `Years passed.`,`Different places, different stories.`,`But some memories don\u2019t fade \u2014`,`they just sit quietly, waiting.`,``,
  `And then, somehow,`,`the universe decided`,`to be kind again.`,``,
  `Here we are.`,`Different colleges, different paths.`,`But connected, again.`,`And honestly?`,`That still feels a little unreal.`,``,
  `Today is your day.`,`I hope this year is gentle with you.`,`I hope it brings you the kind`,`of happiness that sneaks up`,`when you least expect it. \ud83c\udf38`,``,
  `You deserve peace.`,`You deserve laughter`,`that makes your eyes close.`,`You deserve every little thing`,`your heart has been`,`quietly hoping for.`,``,
  `Happy Birthday.`,``,
  `\u2014 from someone who\u2019s just`,`\u00a0\u00a0really glad you came back \ud83d\udc9b`
];
const msgDiv=document.getElementById('msg');
let li=0,ci=0,typing=false;

function type(){
  if(li>=lines.length){msgDiv.innerHTML+='<span class="cursor"></span>';return}
  const line=lines[li];
  if(ci<line.length){
    const ch=line[ci];
    if(ch==='\uD83C'||ch==='\uD83D'||ch==='\uD83E'){msgDiv.innerHTML+=ch+line[ci+1];ci+=2}
    else{msgDiv.innerHTML+=ch==='<'?'&lt;':ch;ci++}
    setTimeout(type,Math.random()*35+28);
  }else{msgDiv.innerHTML+='<br>';li++;ci=0;setTimeout(type,line===''?60:75)}
}

// Start typing when message section is visible
const obs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting&&!typing){typing=true;setTimeout(type,400)}});
},{threshold:.15});
obs.observe(document.getElementById('sec-msg'));
</script>
</body>
</html>
